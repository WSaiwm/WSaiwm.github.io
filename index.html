<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>签收一份美好祝福</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
}

/* 背景 */
body{
  background:linear-gradient(135deg,#f5f7fa 0%,#e4eefe 100%);
  display:grid;
  place-items:center;
  padding:20px;
}

/* 容器 */
.wrap{
  text-align:center;
  max-width:320px;
  width:100%;
}

/* 礼物动画 */
.gift{
  font-size:64px;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

/* 标题 */
.title{
  font-size:22px;
  color:#2d3748;
  margin:24px 0 12px;
  font-weight:600;
}

/* 描述 */
.desc{
  font-size:14px;
  color:#718096;
  margin-bottom:36px;
}

/* 按钮 */
.btn{
  display:inline-block;
  padding:14px 36px;
  background:linear-gradient(90deg,#667eea 0%,#764ba2 100%);
  color:#fff;
  border-radius:50px;
  text-decoration:none;
  font-size:16px;
  font-weight:500;
  box-shadow:0 8px 20px rgba(102,126,234,0.3);
  transition:all 0.3s ease;
}

/* 点击动画 */
.btn:active{
  transform:scale(0.96);
}

.btn:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 24px rgba(102,126,234,0.4);
}

/* 小提示 */
.tip{
  margin-top:20px;
  font-size:12px;
  color:#a0aec0;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="gift">🎁</div>

  <h1 class="title">签收一份小美好</h1>

  <p class="desc">点击开启，收获温暖与好运</p>

  <!-- ⭐ 关键：跳转到你的祝福页面 -->
  <a href="index.html" class="btn">点击开始祝福</a>

  <div class="tip">建议打开声音体验更佳 🎵</div>
</div>

</body>
</html>
