<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>签收一份美好祝福</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
body{
background:linear-gradient(135deg,#f5f7fa 0%,#e4eefe 100%);
display:grid;place-items:center;padding:20px
}
.wrap{text-align:center;max-width:320px;width:100%}
.gift{
font-size:60px;
animation:float 3s ease-in-out infinite
}
@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}
.title{
font-size:22px;
color:#2d3748;
margin:24px 0 12px;
font-weight:500
}
.desc{
font-size:14px;
color:#718096;
margin-bottom:36px
}
.btn{
display:inline-block;
padding:14px 36px;
background:linear-gradient(90deg,#667eea 0%,#764ba2 100%);
color:#fff;
border-radius:50px;
text-decoration:none;
font-size:16px;
font-weight:500;
box-shadow:0 8px 20px rgba(102,126,234,0.3);
transition:all 0.3s ease
}
.btn:hover{
transform:translateY(-3px);
box-shadow:0 12px 24px rgba(102,126,234,0.4)
}
.btn:active{transform:translateY(0)}
</style>
</head>
<body>
<div class="wrap">
<div class="gift">🎁</div>
<h1 class="title">签收一份小美好</h1>
<p class="desc">点击开启，收获温暖与好运</p >
<a href=" '愿你平安喜乐，万事顺意✨')" class="btn">点击开始祝福</a >
</div>
</body>
</html>
