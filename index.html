<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>生日快乐 🎂</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:"微软雅黑";
}

/* 背景 */
#globalBg{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  filter: blur(25px) brightness(0.5);
  z-index:-1;
  transition:1s;
}

/* 页面 */
.page{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
}

.active{display:flex;}

.main{
  max-width:70%;
  max-height:70%;
  border-radius:16px;
  opacity:0;
  transition:1s;
}

.zoom{transform:scale(1.1);}

/* 开始页 */
#start{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:28px;
  z-index:999;
}

canvas{
  position:absolute;
  top:0;
  left:0;
}
</style>
</head>

<body>

<div id="start">🎁 点击开始祝福</div>

<img id="globalBg">

<audio id="bgm" loop>
  <source src="music.mp3">
</audio>

<!-- 页面（已删除“生日快乐页”） -->
<div class="page active"><img class="main" id="main1"></div>
<div class="page"><img class="main" id="main2"></div>
<div class="page"><img class="main" id="main3"></div>
<div class="page"><img class="main" id="main4"></div>

<!-- 烟花页 -->
<div class="page">
  <canvas id="cvs"></canvas>
</div>

<script>
// ===== 图片 =====
const groups={
  1:["1.jpg","2.jpg","3.jpg"],
  2:["4.jpg","5.jpg","6.jpg"],
  3:["7.jpg","8.jpg","9.jpg","10.jpg"],
  4:["11.jpg","12.jpg","13.jpg","14.jpg","15.jpg"]
};

// ===== 50秒时间轴 =====
const timeline=[10000,10000,10000,10000,10000];

const pages=document.querySelectorAll(".page");
let index=0,timers=[];

function clearAll(){
  timers.forEach(t=>clearTimeout(t));
  timers=[];
}

// ===== 图片播放 =====
function play(i,d){
  const imgs=groups[i+1];
  const main=document.getElementById("main"+(i+1));
  let k=0;
  const interval=d/imgs.length;

  function next(){
    let src=imgs[k];
    main.style.opacity=0;

    setTimeout(()=>{
      main.src=src;
      main.style.opacity=1;

      globalBg.style.opacity=0;
      setTimeout(()=>{
        globalBg.src=src;
        globalBg.style.opacity=1;
      },300);

      main.classList.add("zoom");
    },300);

    k=(k+1)%imgs.length;
  }

  next();
  let t=setInterval(next,interval);
  timers.push(t);
}

// ===== 粒子烟花 =====
let canvas,ctx,particles=[],textPoints=[],mode="fire";

class Particle{
  constructor(x,y){
    this.x=x;
    this.y=y;
    this.vx=(Math.random()-0.5)*6;
    this.vy=(Math.random()-0.5)*6;
    this.color=`hsl(${Math.random()*360},100%,60%)`;
  }
  update(){
    this.x+=this.vx;
    this.y+=this.vy;
    this.vy+=0.05;
  }
  draw(){
    ctx.fillStyle=this.color;
    ctx.fillRect(this.x,this.y,3,3);
  }
}

function explode(x,y){
  for(let i=0;i<80;i++){
    particles.push(new Particle(x,y));
  }
}

function createText(text){
  let off=document.createElement("canvas");
  let octx=off.getContext("2d");

  off.width=canvas.width;
  off.height=canvas.height;

  octx.fillStyle="white";
  octx.font="bold 120px 微软雅黑";
  octx.textAlign="center";
  octx.fillText(text,canvas.width/2,canvas.height/2);

  let data=octx.getImageData(0,0,off.width,off.height).data;

  textPoints=[];
  for(let y=0;y<off.height;y+=6){
    for(let x=0;x<off.width;x+=6){
      let i=(y*off.width+x)*4;
      if(data[i+3]>128){
        textPoints.push({x,y});
      }
    }
  }
}

function gather(){
  particles.forEach((p,i)=>{
    let t=textPoints[i%textPoints.length];
    p.x+=(t.x-p.x)*0.08;
    p.y+=(t.y-p.y)*0.08;
  });
}

function animate(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    if(mode==="fire"||mode==="explode")p.update();
    if(mode==="gather")gather();
    p.draw();
  });

  requestAnimationFrame(animate);
}

function startFire(){
  canvas=document.getElementById("cvs");
  ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  particles=[];
  mode="fire";

  animate();

  let t1=setInterval(()=>explode(Math.random()*canvas.width,Math.random()*canvas.height*0.6),400);
  timers.push(t1);

  let t2=setTimeout(()=>{
    clearInterval(t1);
    createText("老师生日快乐！");

    for(let i=0;i<textPoints.length;i++){
      particles.push(new Particle(
        Math.random()*canvas.width,
        Math.random()*canvas.height
      ));
    }

    mode="gather";
  },4000);
  timers.push(t2);

  let t3=setTimeout(()=>{
    mode="explode";
    explode(canvas.width/2,canvas.height/2);
  },7000);
  timers.push(t3);
}

// ===== 页面切换 =====
function show(i){
  clearAll();

  pages.forEach(p=>p.classList.remove("active"));
  pages[i].classList.add("active");

  let d=timeline[i];

  if(i>=0 && i<=3){
    play(i,d);
  }

  if(i===4){
    startFire();
  }

  let t=setTimeout(()=>{
    index++;
    if(index>=pages.length){
      index=0;
      bgm.currentTime=0;
    }
    show(index);
  },d);

  timers.push(t);
}

// ===== 开始 =====
start.onclick=()=>{
  start.style.display="none";
  bgm.play();
  show(0);
};
</script>

</body>
</html>
